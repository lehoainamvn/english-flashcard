<nav class="navbar">
  <div class="nav-inner">
    <!-- Brand -->
    <a class="nav-brand" routerLink="/dashboard">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      FlashLearn
    </a>

    <!-- Nav links -->
    <div class="nav-center">
      <button class="nav-link" routerLink="/dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Lịch sử
      </button>
    </div>

    <!-- Actions -->
    <div class="nav-actions">
      @if (isLoggedIn()) {
        <!-- Profile Dropdown -->
        <div class="profile-dropdown" (click)="toggleProfile()">
          <button class="profile-btn" title="Hồ sơ">
            <div class="avatar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span>{{ userName() }}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" 
              [style.transform]="isProfileOpen() ? 'rotate(180deg)' : 'rotate(0deg)'"
              style="transition: transform 0.2s ease">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <!-- Dropdown Menu -->
          @if (isProfileOpen()) {
            <div class="dropdown-menu" [@fadeIn]>
              <button class="dropdown-item" (click)="goProfile()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Hồ sơ cá nhân
              </button>
              @if (isAdmin()) {
                <button class="dropdown-item" (click)="goAdmin()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Quản lý
                </button>
              }
              <div class="dropdown-divider"></div>
              <button class="dropdown-item danger" (click)="logout()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Đăng xuất
              </button>
            </div>
          }
        </div>
      } @else {
        <!-- Not logged in -->
        <button class="nav-user-icon" (click)="switchMode()" title="Đăng nhập">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="btn-login" (click)="switchMode()">Đăng nhập</button>
        <button class="btn-start" (click)="switchMode()">Bắt đầu học</button>
      }
    </div>
  </div>
</nav>
