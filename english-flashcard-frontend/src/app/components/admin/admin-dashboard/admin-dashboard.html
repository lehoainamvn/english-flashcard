<div class="dashboard">
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p>Tổng quan hệ thống</p>
    </div>
    <div class="header-date">{{ today | date:'dd/MM/yyyy' }}</div>
  </div>

  <div *ngIf="loading" class="stats-grid">
    <div class="stat-card skeleton" *ngFor="let i of [1,2]"></div>
  </div>

  <div *ngIf="!loading" class="stats-grid">
    <div class="stat-card card-users">
      <div class="card-label">Tổng người dùng</div>
      <div class="card-value">{{ stats.totalUsers }}</div>
      <a routerLink="/admin/users" class="card-link">Xem chi tiết</a>
    </div>

    <div class="stat-card card-words">
      <div class="card-label">Tổng từ vựng</div>
      <div class="card-value">{{ stats.totalFlashcards }}</div>
      <a routerLink="/admin/words" class="card-link">Xem chi tiết</a>
    </div>
  </div>

  
</div>
