<div class="category-management">
  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Quay lại
      </button>
      <div>
        <h1>Quản lý Danh mục</h1>
        <p>Thêm, sửa, xóa danh mục flashcard</p>
      </div>
    </div>
    <button class="btn-add" (click)="openCreateModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Thêm danh mục
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading()" class="loading">
    <div class="spinner"></div>
    <p>Đang tải danh mục...</p>
  </div>

  <!-- Categories List -->
  <div *ngIf="!loading()" class="categories-grid">
    <div class="category-card" *ngFor="let category of categories(); trackBy: trackByIndex">
      <div class="category-info">
        <h3>{{ category.name }}</h3>
        <p>ID: {{ category.id }}</p>
      </div>
      <div class="category-actions">
        <button class="btn-edit" (click)="openEditModal(category)" title="Sửa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="btn-delete" (click)="deleteCategory(category)" title="Xóa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="categories().length === 0" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
      </svg>
      <h3>Chưa có danh mục nào</h3>
      <p>Thêm danh mục đầu tiên để bắt đầu</p>
      <button class="btn-primary" (click)="openCreateModal()">Thêm danh mục</button>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal()" class="modal-backdrop" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ editingCategory() ? 'Sửa danh mục' : 'Thêm danh mục mới' }}</h2>
        <button class="btn-close" (click)="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="form-group">
          <label for="categoryName">Tên danh mục</label>
          <input 
            type="text" 
            id="categoryName"
            [(ngModel)]="newCategory.name" 
            placeholder="Nhập tên danh mục..."
            class="form-input"
            (keyup.enter)="saveCategory()"
          />
        </div>
      </div>
      
      <div class="modal-footer">
        <button class="btn-secondary" (click)="closeModal()">Hủy</button>
        <button class="btn-primary" (click)="saveCategory()">
          {{ editingCategory() ? 'Cập nhật' : 'Thêm' }}
        </button>
      </div>
    </div>
  </div>
</div>
