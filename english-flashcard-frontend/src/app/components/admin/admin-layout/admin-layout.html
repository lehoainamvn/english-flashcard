<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <span class="logo-title">Admin Panel</span>
        <span class="logo-sub">English Flashcard</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">TỔNG QUAN</div>
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-item">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>

      <div class="nav-section-label">QUẢN LÝ</div>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span>
        <span>Người dùng</span>
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📚</span>
        <span>Danh mục</span>
      </a>
      <a routerLink="/admin/words" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📝</span>
        <span>Từ vựng</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <span>🚪</span> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
