<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-block">
        <span class="logo-title">Admin Panel</span>
        <span class="logo-sub">English Flashcard</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">TỔNG QUAN</div>
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-item">
        Dashboard
      </a>

      <div class="nav-section-label">QUẢN LÝ</div>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        Người dùng
      </a>
      <a routerLink="/admin/words" routerLinkActive="active" class="nav-item">
        Từ vựng
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">Đăng xuất</button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
