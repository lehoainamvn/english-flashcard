<div class="auth-page">
  <!-- Background particles -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="auth-container">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">📚</span>
      <h1>FlashCard <span class="text-gradient">English</span></h1>
      <p class="tagline">Học từ vựng thông minh, tiến bộ mỗi ngày</p>
    </div>

    <!-- Card -->
    <div class="auth-card glass-panel">
      <!-- Tabs -->
      <div class="tab-switcher">
        <button [class.active]="isLogin()" (click)="isLogin() || switchMode()">Đăng Nhập</button>
        <button [class.active]="!isLogin()" (click)="!isLogin() || switchMode()">Đăng Ký</button>
        <div class="tab-indicator" [class.right]="!isLogin()"></div>
      </div>

      <!-- Alert messages -->
      @if (errorMsg()) {
        <div class="alert alert-error">⚠️ {{ errorMsg() }}</div>
      }
      @if (successMsg()) {
        <div class="alert alert-success">✅ {{ successMsg() }}</div>
      }

      <!-- Login Form -->
      @if (isLogin()) {
        <form class="auth-form" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label>Email</label>
            <input class="input-field" type="email" [(ngModel)]="loginEmail" name="email"
              placeholder="example@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <input class="input-field" type="password" [(ngModel)]="loginPassword" name="password"
              placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="btn-primary btn-full" type="submit" [disabled]="isLoading()">
            @if (isLoading()) { <span class="spinner"></span> Đang đăng nhập... }
            @else { 🚀 Đăng Nhập }
          </button>
        </form>
      }

      <!-- Register Form -->
      @if (!isLogin()) {
        <form class="auth-form" (ngSubmit)="onRegister()">
          <div class="form-group">
            <label>Tên người dùng</label>
            <input class="input-field" type="text" [(ngModel)]="registerUsername" name="username"
              placeholder="Nhập tên của bạn" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input class="input-field" type="email" [(ngModel)]="registerEmail" name="email"
              placeholder="example@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <input class="input-field" type="password" [(ngModel)]="registerPassword" name="password"
              placeholder="Ít nhất 6 ký tự" autocomplete="new-password" />
          </div>
          <button class="btn-primary btn-full" type="submit" [disabled]="isLoading()">
            @if (isLoading()) { <span class="spinner"></span> Đang đăng ký... }
            @else { ✨ Tạo Tài Khoản }
          </button>
        </form>
      }
    </div>
  </div>
</div>
