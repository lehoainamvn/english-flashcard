spring.application.name=english-flashcard-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/english_flashcard
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_password_here}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# IMPORTANT: Use environment variables or application-local.properties for actual values
jwt.secret=${JWT_SECRET:your_jwt_secret_key_here}
jwt.expiration=${JWT_EXPIRATION:86400000}